name: Build Android APK (Cloud Only)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout your code
        uses: actions/checkout@v4

      - name: ☕ Set up Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🛠️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🪄 Generate Wrapper Automatically in Cloud
        run: gradle wrapper

      - name: 🔓 Give permission to the build tool
        run: chmod +x gradlew

      - name: 🚀 Build the APK
        run: ./gradlew assembleDebug

      - name: 📦 Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
