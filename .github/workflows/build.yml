name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK (Android requires JDK 17) ────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle          # caches ~/.gradle between runs → faster builds

      # ── 3. Cache Gradle dependencies ───────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Grant execute permission to gradlew ─────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. (Optional) Run unit tests before building ───────────────────────
      - name: Run unit tests
        run: ./gradlew test --stacktrace
        continue-on-error: true   # won't fail the whole pipeline if tests fail

      # ── 6. Build the Debug APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 7. Upload APK as a downloadable artifact ───────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ExpiryManager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14     # APK stays available for 14 days

  # ── OPTIONAL: Release (signed) build ──────────────────────────────────────
