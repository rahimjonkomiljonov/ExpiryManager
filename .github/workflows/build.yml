name: Build Android APK (Cloud Only)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout your code
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install

      - name: ☕ Set up Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 🔓 Give permission to build tools
        run: chmod +x /usr/local/lib/android/sdk/cmdline-tools/*/bin/*

      - name: 🚀 Build the APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npm install -g eas-cli
          eas build --platform android --local --wait

      - name: 📦 Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ./build-*.apk
