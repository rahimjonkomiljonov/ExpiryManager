name: Build Android APK

# This tells GitHub to run the build automatically whenever you push new code to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout your code
        uses: actions/checkout@v4

      - name: ☕ Set up Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: 🛠️ Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: 🔓 Give permission to the build tool
        run: chmod +x gradlew

      - name: 🚀 Build the APK
        run: ./gradlew assembleDebug

      - name: 📦 Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
